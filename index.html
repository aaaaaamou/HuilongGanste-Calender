<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人共享日曆系統 (Vue 3 + FullCalendar)</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FullCalendar 核心與語系 -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales-all.global.min.js'></script>

    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 微調 FullCalendar 的樣式使其融入 Tailwind */
        .fc-theme-standard td, .fc-theme-standard th {
            border-color: #e5e7eb;
        }
        .fc-header-toolbar {
            margin-bottom: 1.5rem !important;
        }
        .fc-button-primary {
            background-color: #3b82f6 !important;
            border-color: #3b82f6 !important;
            text-transform: capitalize !important;
        }
        .fc-button-primary:hover {
            background-color: #2563eb !important;
            border-color: #2563eb !important;
        }
        .fc-button-active {
            background-color: #1d4ed8 !important;
        }
        .fc-event {
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
            transition: opacity 0.2s;
        }
        .fc-event-dragging {
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden font-sans">
    <div id="app" class="h-full flex flex-col">
        
        <!-- ================= 登入畫面 ================= -->
        <div v-if="!currentUser" class="flex-grow flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center relative overflow-hidden">
                <div v-if="isInitializing" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-10">
                    <div class="flex flex-col items-center">
                        <i data-lucide="loader-2" class="w-8 h-8 text-blue-600 animate-spin mb-2"></i>
                        <span class="text-sm text-gray-600 font-medium">系統初始化中...</span>
                    </div>
                </div>

                <div class="mx-auto bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i data-lucide="calendar-days" class="text-blue-600 w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">共享日曆系統</h1>
                <p class="text-gray-500 mb-8">請輸入您的姓名或 Email 以進入工作區</p>
                
                <form @submit.prevent="login" class="space-y-4">
                    <input 
                        v-model="nameInput" 
                        type="text" 
                        required
                        placeholder="例如：王小明 或 ming@example.com" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    >
                    <button 
                        type="submit" 
                        :disabled="isInitializing"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors shadow-lg shadow-blue-200 disabled:opacity-50"
                    >
                        進入日曆
                    </button>
                </form>
            </div>
        </div>

        <!-- ================= 主日曆畫面 ================= -->
        <div v-else class="flex-grow flex flex-col h-full relative">
            
            <!-- 雲端同步狀態提示 (僅在雲端模式下斷線時顯示) -->
            <div v-if="storageMode === 'cloud' && !isDbConnected" class="absolute top-0 left-0 right-0 bg-amber-100 text-amber-800 text-xs text-center py-1 z-50 flex justify-center items-center">
                <i data-lucide="wifi-off" class="w-3 h-3 mr-1"></i> 雲端連線中斷，您目前可能看到的是舊資料。
            </div>

            <!-- 頂部導覽列 -->
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shrink-0 mt-[1px]">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 w-8 h-8 rounded text-white flex items-center justify-center font-bold">
                        C
                    </div>
                    <h1 class="text-xl font-bold text-gray-800 flex items-center">
                        團隊共用日曆
                        
                        <span class="ml-3 flex items-center text-[10px] bg-gray-800 text-white px-2 py-0.5 rounded-full" title="資料直接儲存於 GitHub Repo">
                            <i data-lucide="github" class="w-3 h-3 mr-1"></i>
                            GitHub 直連模式
                        </span>
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button @click="loadFromGitHub(true)" :disabled="isLoadingEvents" class="text-sm text-blue-600 hover:text-blue-800 flex items-center bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-full transition-colors disabled:opacity-50" title="手動抓取最新資料">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-1" :class="{'animate-spin': isLoadingEvents}"></i> 同步最新
                    </button>
                    <div class="flex items-center text-sm text-gray-600 bg-gray-100 px-3 py-1.5 rounded-full">
                        <i data-lucide="user" class="w-4 h-4 mr-2"></i>
                        目前身分：<span class="font-semibold text-gray-800 ml-1">{{ currentUser }}</span>
                    </div>
                    <button @click="logout" class="text-gray-500 hover:text-red-600 transition-colors p-2" title="登出">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- 日曆容器 -->
            <main class="flex-grow p-6 overflow-auto">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 h-full min-h-[600px] relative">
                    <div v-show="isLoadingEvents" class="absolute inset-0 bg-white/60 backdrop-blur-sm flex items-center justify-center z-10 rounded-xl">
                        <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin"></i>
                    </div>
                    <!-- Vue 的 ref 用於綁定 FullCalendar -->
                    <div ref="calendarEl" class="h-full"></div>
                </div>
            </main>
        </div>

        <!-- ================= 活動編輯/新增 Modal ================= -->
        <div v-if="showModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                <!-- Modal 標題 -->
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center">
                        <i v-if="modalMode === 'add'" data-lucide="calendar-plus" class="w-5 h-5 mr-2 text-blue-600"></i>
                        <i v-else-if="modalMode === 'edit'" data-lucide="edit" class="w-5 h-5 mr-2 text-amber-500"></i>
                        <i v-else data-lucide="eye" class="w-5 h-5 mr-2 text-gray-500"></i>
                        {{ modalMode === 'add' ? '新增活動' : modalMode === 'edit' ? '編輯活動' : '活動詳情' }}
                    </h2>
                    <button @click="showModal = false" :disabled="isSaving" class="text-gray-400 hover:text-gray-600 disabled:opacity-50">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <!-- Modal 內容 -->
                <div class="p-6 overflow-y-auto flex-grow space-y-4">
                    
                    <!-- ✨ AI 智能解析區塊 (僅在新增時顯示) -->
                    <div v-if="modalMode === 'add'" class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 mb-2">
                        <label class="block text-sm font-bold text-indigo-800 mb-2 flex items-center">
                            <span>✨ AI 智能建立</span>
                            <span class="text-xs font-normal text-indigo-600 ml-2">貼上對話或信件，讓 AI 自動解析</span>
                        </label>
                        <div class="flex space-x-2">
                            <input 
                                type="text" 
                                v-model="aiParseText"
                                placeholder="例如：明天下午兩點到四點跟老闆在會議室開專案啟動會議"
                                class="flex-grow px-3 py-2 border border-indigo-200 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                                @keyup.enter="parseTextWithAI"
                                :disabled="isParsingAI || isSaving"
                            >
                            <button 
                                @click="parseTextWithAI" 
                                :disabled="isParsingAI || !aiParseText.trim() || isSaving"
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium transition-colors disabled:opacity-50 flex items-center shrink-0"
                            >
                                <i v-if="isParsingAI" data-lucide="loader-2" class="w-4 h-4 mr-1 animate-spin"></i>
                                {{ isParsingAI ? '解析中...' : '解析' }}
                            </button>
                        </div>
                        <p v-if="aiErrorMsg" class="text-red-500 text-xs mt-1">{{ aiErrorMsg }}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">活動標題 <span class="text-red-500">*</span></label>
                        <input 
                            type="text" 
                            v-model="currentEvent.title" 
                            :disabled="modalMode === 'view' || isSaving"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-50 disabled:text-gray-500"
                            placeholder="請輸入活動名稱"
                        >
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">開始時間</label>
                            <input 
                                type="text" 
                                :value="formatDateDisplay(currentEvent.start)" 
                                disabled
                                class="w-full px-3 py-2 border border-gray-200 rounded-md bg-gray-50 text-gray-600 text-sm"
                            >
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">結束時間</label>
                            <input 
                                type="text" 
                                :value="formatDateDisplay(currentEvent.end)" 
                                disabled
                                class="w-full px-3 py-2 border border-gray-200 rounded-md bg-gray-50 text-gray-600 text-sm"
                            >
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-sm font-medium text-gray-700">活動備註</label>
                            <button 
                                v-if="modalMode !== 'view'"
                                @click="polishDescriptionWithAI"
                                :disabled="isPolishing || !currentEvent.extendedProps.description || isSaving"
                                class="text-xs text-indigo-600 hover:text-indigo-800 flex items-center disabled:opacity-50 transition-colors bg-indigo-50 px-2 py-1 rounded"
                                title="讓 AI 幫您潤飾這段備註"
                            >
                                <i v-if="isPolishing" data-lucide="loader-2" class="w-3 h-3 mr-1 animate-spin"></i>
                                <span v-else>✨</span> 
                                {{ isPolishing ? '潤飾中...' : 'AI 潤飾' }}
                            </button>
                        </div>
                        <textarea 
                            v-model="currentEvent.extendedProps.description" 
                            :disabled="modalMode === 'view' || isSaving"
                            rows="3"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-50 disabled:text-gray-500"
                            placeholder="輸入更多活動細節..."
                        ></textarea>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-start mt-4">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500 mt-0.5 mr-2 shrink-0"></i>
                        <div class="text-sm text-blue-800">
                            發起人：<span class="font-bold">{{ currentEvent.extendedProps.creator }}</span>
                            <span v-if="modalMode === 'view'" class="block text-blue-600 text-xs mt-1">您只能檢視此活動，因為您不是發起人。</span>
                        </div>
                    </div>
                </div>

                <!-- Modal 按鈕區 -->
                <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex justify-end space-x-3">
                    <button 
                        v-if="modalMode === 'edit'" 
                        @click="deleteEvent" 
                        :disabled="isSaving"
                        class="px-4 py-2 border border-red-200 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-medium transition-colors mr-auto disabled:opacity-50"
                    >
                        刪除活動
                    </button>
                    
                    <button 
                        @click="showModal = false" 
                        :disabled="isSaving"
                        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 font-medium transition-colors disabled:opacity-50"
                    >
                        {{ modalMode === 'view' ? '關閉' : '取消' }}
                    </button>
                    
                    <button 
                        v-if="modalMode !== 'view'" 
                        @click="saveEvent" 
                        :disabled="isSaving"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors shadow-sm shadow-blue-200 disabled:opacity-50 flex items-center"
                    >
                        <i v-if="isSaving" data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i>
                        {{ isSaving ? '儲存中...' : '儲存' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createApp, ref, onMounted, nextTick } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
        
        // =========================================================================
        // ⚠️ 必填設定：請在這裡填寫您的 GitHub 專案資訊 (部署前務必修改)
        // =========================================================================
        const GITHUB_USERNAME = 'aaaaaamou'; // 您的 GitHub 帳號 (例如: 'wang')
        const GITHUB_REPO = 'HuilongGanste-Calender';           // 您的專案名稱 (例如: 'shared-calendar')
        const GITHUB_FILE_PATH = 'data.json';           // 存放資料的檔案名稱
        const GITHUB_TOKEN = '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';       // ⚠️ 您的 GitHub Token
        const GITHUB_BRANCH = 'main';                   // 分支名稱 (通常是 main 或 master)
        // =========================================================================

        createApp({
            setup() {
                // 狀態管理
                const currentUser = ref(localStorage.getItem('cal_user') || '');
                const nameInput = ref('');
                const calendarEl = ref(null);
                let calendar = null;
                
                // GitHub 狀態
                const isInitializing = ref(false); 
                const isLoadingEvents = ref(false); 
                const isSaving = ref(false); 
                const currentSha = ref(null); // 用於追蹤 GitHub 檔案版本，避免覆蓋衝突
                
                // Modal 狀態
                const showModal = ref(false);
                const modalMode = ref('add'); 
                const currentEvent = ref({
                    id: '', title: '', start: '', end: '', 
                    extendedProps: { creator: '', description: '' }
                });

                // ================= Gemini API 整合 (保留原功能) =================
                const apiKey = "";
                const aiParseText = ref('');
                const isParsingAI = ref(false);
                const isPolishing = ref(false);
                const aiErrorMsg = ref('');

                const callGemini = async (prompt, expectJson = false, systemInstruction = "") => {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
                    if (expectJson) payload.generationConfig = { responseMimeType: "application/json" };

                    for (let i = 0; i < 3; i++) {
                        try {
                            const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                            const data = await response.json();
                            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                            return expectJson ? JSON.parse(text) : text;
                        } catch (e) {
                            if (i < 2) await new Promise(res => setTimeout(res, 1000));
                            else throw e;
                        }
                    }
                };

                const parseTextWithAI = async () => {
                    if (!aiParseText.value.trim() || isParsingAI.value) return;
                    isParsingAI.value = true;
                    try {
                        const today = new Date().toISOString();
                        const selectedDate = currentEvent.value.start; 
                        const prompt = `提取活動細節。現在時間：${today}。基準日期：${selectedDate}。文本："${aiParseText.value}"。回傳 JSON: title, start(ISO), end(ISO), description。`;
                        const result = await callGemini(prompt, true, "嚴格輸出 JSON。");
                        
                        if (result.title) currentEvent.value.title = result.title;
                        if (result.start) currentEvent.value.start = result.start;
                        if (result.end) currentEvent.value.end = result.end;
                        if (result.description) currentEvent.value.extendedProps.description = result.description;
                        aiParseText.value = ''; 
                    } catch (error) {
                        aiErrorMsg.value = "AI 解析失敗。"; setTimeout(() => aiErrorMsg.value = '', 4000);
                    } finally { isParsingAI.value = false; }
                };

                const polishDescriptionWithAI = async () => {
                    if (!currentEvent.value.extendedProps.description || isPolishing.value) return;
                    isPolishing.value = true;
                    try {
                        const result = await callGemini(`潤飾備註，直接輸出：\n\n"${currentEvent.value.extendedProps.description}"`, false, "你是專業秘書。");
                        if (result) currentEvent.value.extendedProps.description = result.trim();
                    } catch (error) {} finally { isPolishing.value = false; }
                };

                // ================= GitHub API 讀寫邏輯 =================
                // 處理 Base64 編碼 (支援中文)
                const utf8ToBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
                const base64ToUtf8 = (str) => decodeURIComponent(escape(atob(str)));

                // 從 GitHub 讀取資料
                const loadFromGitHub = async (isManual = false) => {
                    if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') return [];
                    isLoadingEvents.value = true;
                    try {
                        const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}?ref=${GITHUB_BRANCH}&t=${Date.now()}`;
                        const res = await fetch(url, {
                            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                        });
                        
                        if (res.status === 404) {
                            isLoadingEvents.value = false;
                            console.warn("⚠️ GitHub 上尚未建立檔案，將在首次儲存時自動建立。");
                            return [];
                        }
                        if (res.status === 401) throw new Error("Token 驗證失敗，請檢查您的 GitHub Token 是否正確或已過期。");
                        if (res.status === 403) throw new Error("權限不足，請檢查 Token 是否包含 'Contents: Read and write' 權限。");
                        if (!res.ok) throw new Error(`HTTP 狀態碼: ${res.status}`);
                        
                        const data = await res.json();
                        currentSha.value = data.sha; 
                        
                        const contentStr = base64ToUtf8(data.content);
                        // 處理空檔案的情況
                        if (!contentStr.trim()) return [];
                        
                        const events = JSON.parse(contentStr);
                        
                        if (calendar) {
                            calendar.removeAllEvents();
                            calendar.addEventSource(events);
                        }
                        isLoadingEvents.value = false;
                        if (isManual) alert("✅ 已成功從 GitHub 同步最新資料！");
                        return events;
                    } catch (error) {
                        console.error("讀取 GitHub 失敗:", error);
                        isLoadingEvents.value = false;
                        if (isManual) alert(`❌ 讀取失敗：\n${error.message}\n\n請檢查 F12 開發者工具的 Console 看詳細錯誤。`);
                        return [];
                    }
                };

                // 儲存資料到 GitHub
                const pushToGitHub = async (eventsArray) => {
                    try {
                        // 1. 先抓取最新 SHA (避免衝突)
                        const getRes = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}?ref=${GITHUB_BRANCH}&t=${Date.now()}`, {
                            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                        });
                        if (getRes.ok) {
                            const getData = await getRes.json();
                            currentSha.value = getData.sha;
                        } else if (getRes.status !== 404) {
                            // 404 是正常的(代表檔案還不存在)，其他錯誤則拋出
                            const errorText = await getRes.text();
                            throw new Error(`取得檔案狀態失敗 (${getRes.status}): ${errorText}`);
                        }

                        // 2. 寫入檔案
                        const contentStr = JSON.stringify(eventsArray, null, 2);
                        const body = {
                            message: `Update calendar events via App by ${currentUser.value}`,
                            content: utf8ToBase64(contentStr),
                            branch: GITHUB_BRANCH
                        };
                        if (currentSha.value) body.sha = currentSha.value;

                        const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`, {
                            method: 'PUT',
                            headers: { 
                                'Authorization': `token ${GITHUB_TOKEN}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });

                        if (!res.ok) {
                            const errorData = await res.json().catch(() => ({ message: '未知錯誤' }));
                            throw new Error(`寫入失敗 (${res.status}): ${errorData.message}`);
                        }
                        
                        const data = await res.json();
                        currentSha.value = data.content.sha; 
                        return true;
                    } catch (error) {
                        console.error("寫入 GitHub 失敗:", error);
                        throw error; // 往上拋給 saveEvent 處理
                    }
                };

                // ================= 工具與日曆管理 =================
                const initIcons = () => { nextTick(() => { if (window.lucide) window.lucide.createIcons(); }); };

                const formatDateDisplay = (dateStr) => {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    return d.toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                };

                const getColorForUser = (username) => {
                    let hash = 0;
                    for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
                    return `hsl(${Math.abs(hash) % 360}, 70%, 45%)`; 
                };

                // 登入登出
                const login = () => {
                    if (nameInput.value.trim()) {
                        if (GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                            alert("⚠️ 請先在程式碼中填寫您的 GitHub 專案資訊與 Token！");
                            return;
                        }
                        currentUser.value = nameInput.value.trim();
                        localStorage.setItem('cal_user', currentUser.value);
                        nextTick(() => {
                            initCalendar();
                            initIcons();
                            loadFromGitHub();
                        });
                    }
                };

                const logout = () => {
                    currentUser.value = '';
                    localStorage.removeItem('cal_user');
                    if (calendar) calendar.destroy();
                    setTimeout(initIcons, 100);
                };

                // ================= 統一的資料儲存處理 (GitHub 版) =================
                const saveEvent = async () => {
                    if (!currentEvent.value.title.trim()) { alert("請輸入活動標題！"); return; }
                    
                    isSaving.value = true;
                    const eventPayload = {
                        title: currentEvent.value.title, start: currentEvent.value.start, end: currentEvent.value.end,
                        backgroundColor: currentEvent.value.backgroundColor, borderColor: currentEvent.value.borderColor,
                        extendedProps: { creator: currentEvent.value.extendedProps.creator, description: currentEvent.value.extendedProps.description }
                    };

                    try {
                        const currentEvents = calendar.getEvents().map(e => ({
                            id: e.id, title: e.title, start: e.startStr, end: e.endStr,
                            backgroundColor: e.backgroundColor, borderColor: e.borderColor,
                            extendedProps: { creator: e.extendedProps.creator, description: e.extendedProps.description }
                        }));

                        if (modalMode.value === 'add') {
                            currentEvents.push({ id: Date.now().toString(), ...eventPayload });
                        } else if (modalMode.value === 'edit') {
                            const idx = currentEvents.findIndex(e => e.id === currentEvent.value.id);
                            if (idx > -1) currentEvents[idx] = { id: currentEvent.value.id, ...eventPayload };
                        }
                        
                        await pushToGitHub(currentEvents);
                        loadFromGitHub(); // 儲存後重新讀取確保畫面正確
                        showModal.value = false;
                    } catch (error) {
                        alert(`❌ 儲存至 GitHub 失敗！\n\n系統訊息: ${error.message}\n\n可能是 Token 設定錯誤、權限不足，或是多人同時編輯發生衝突。`);
                    } finally {
                        isSaving.value = false;
                    }
                };

                const deleteEvent = async () => {
                    if(confirm('確定要刪除這個活動嗎？')) {
                        isSaving.value = true;
                        try {
                            let currentEvents = calendar.getEvents().map(e => ({
                                id: e.id, title: e.title, start: e.startStr, end: e.endStr,
                                backgroundColor: e.backgroundColor, borderColor: e.borderColor,
                                extendedProps: { creator: e.extendedProps.creator, description: e.extendedProps.description }
                            }));
                            
                            currentEvents = currentEvents.filter(e => e.id !== currentEvent.value.id);
                            await pushToGitHub(currentEvents);
                            loadFromGitHub();
                            showModal.value = false;
                        } catch (error) {
                            alert("刪除失敗。");
                        } finally {
                            isSaving.value = false;
                        }
                    }
                };

                const updateEventTimeOnCalendar = async (info) => {
                    try {
                        const currentEvents = calendar.getEvents().map(e => ({
                            id: e.id, title: e.title, start: e.startStr, end: e.endStr,
                            backgroundColor: e.backgroundColor, borderColor: e.borderColor,
                            extendedProps: { creator: e.extendedProps.creator, description: e.extendedProps.description }
                        }));
                        
                        const idx = currentEvents.findIndex(e => e.id === info.event.id);
                        if (idx > -1) {
                            currentEvents[idx].start = info.event.startStr;
                            currentEvents[idx].end = info.event.endStr || info.event.startStr;
                            await pushToGitHub(currentEvents);
                        }
                    } catch (error) {
                        console.error("更新時間失敗:", error);
                        info.revert(); 
                        alert("時間更新失敗，已退回原位。");
                    }
                };

                // ================= FullCalendar 初始化 =================
                const initCalendar = () => {
                    if (!calendarEl.value) return;
                    calendar = new FullCalendar.Calendar(calendarEl.value, {
                        locale: 'zh-tw',
                        initialView: 'dayGridMonth',
                        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                        events: [], 
                        selectable: true, editable: true, height: '100%',
                        
                        select: (info) => {
                            currentEvent.value = {
                                id: '', title: '', start: info.startStr, end: info.endStr || info.startStr,
                                backgroundColor: getColorForUser(currentUser.value), borderColor: getColorForUser(currentUser.value),
                                extendedProps: { creator: currentUser.value, description: '' }
                            };
                            modalMode.value = 'add';
                            showModal.value = true;
                            initIcons();
                        },
                        
                        eventClick: (info) => {
                            const evt = info.event;
                            const isCreator = evt.extendedProps.creator === currentUser.value;
                            currentEvent.value = {
                                id: evt.id, title: evt.title, start: evt.startStr, end: evt.endStr || evt.startStr,
                                backgroundColor: evt.backgroundColor, borderColor: evt.borderColor,
                                extendedProps: { creator: evt.extendedProps.creator, description: evt.extendedProps.description || '' }
                            };
                            modalMode.value = isCreator ? 'edit' : 'view';
                            showModal.value = true;
                            initIcons();
                        },

                        eventDrop: (info) => {
                            if (info.event.extendedProps.creator !== currentUser.value) {
                                alert('系統提示：您只能移動自己建立的活動喔！'); info.revert(); return;
                            }
                            updateEventTimeOnCalendar(info);
                        },
                        eventResize: (info) => {
                            if (info.event.extendedProps.creator !== currentUser.value) {
                                alert('系統提示：您只能修改自己建立的活動喔！'); info.revert(); return;
                            }
                            updateEventTimeOnCalendar(info);
                        }
                    });
                    calendar.render();
                };

                // ================= 生命週期與初始化 =================
                onMounted(() => {
                    initIcons();
                    if (currentUser.value) {
                        nextTick(() => {
                            initCalendar();
                            loadFromGitHub(); // 登入後自動從 GitHub 抓取最新資料
                        });
                    }
                });

                return {
                    currentUser, nameInput, login, logout,
                    calendarEl, showModal, modalMode, currentEvent,
                    saveEvent, deleteEvent, formatDateDisplay,
                    isInitializing, isLoadingEvents, isSaving, 
                    loadFromGitHub, // 導出供畫面上的重新整理按鈕使用
                    aiParseText, isParsingAI, isPolishing, aiErrorMsg, parseTextWithAI, polishDescriptionWithAI
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
